<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Open WebUI Style Chat</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap");

      :root {
        --bg: #f6f1e7;
        --bg-2: #efe8da;
        --ink: #1d1b17;
        --muted: #6f6a61;
        --card: #fffaf2;
        --accent: #2f6b56;
        --accent-2: #0f3a2e;
        --line: #e1d8c9;
        --shadow: 0 12px 40px rgba(29, 27, 23, 0.12);
        --radius: 18px;
        --sidebar: #f0e7d7;
        --assistant-card: #f2f8f4;
        --assistant-border: #d6e7dd;
        --bubble-assistant: #fff2d8;
        --bubble-assistant-border: #ead9bb;
      }

      [data-theme="dark"] {
        --bg: #14120f;
        --bg-2: #1b1713;
        --ink: #f1ece2;
        --muted: #b0a79a;
        --card: #1f1b16;
        --accent: #9bd0b5;
        --accent-2: #63b48f;
        --line: #2e271f;
        --shadow: 0 14px 40px rgba(9, 8, 7, 0.5);
        --sidebar: #191512;
        --assistant-card: #1c2621;
        --assistant-border: #2c3a34;
        --bubble-assistant: #241d16;
        --bubble-assistant-border: #3a2f24;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: "Space Grotesk", system-ui, sans-serif;
        color: var(--ink);
        background: radial-gradient(1200px 600px at 10% -10%, #fff3d6 0%, transparent 60%),
          radial-gradient(900px 500px at 95% 10%, #e6f1ea 0%, transparent 55%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
        min-height: 100vh;
      }

      [data-theme="dark"] body {
        background: radial-gradient(900px 520px at 8% -10%, rgba(80, 140, 120, 0.24) 0%, transparent 55%),
          radial-gradient(720px 460px at 95% 6%, rgba(60, 90, 120, 0.22) 0%, transparent 55%),
          linear-gradient(180deg, var(--bg) 0%, var(--bg-2) 100%);
      }

      [data-theme="dark"] body::before {
        content: "";
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.22);
        pointer-events: none;
        z-index: 0;
      }

      .layout {
        position: relative;
        z-index: 1;
      }

      .layout {
        display: grid;
        grid-template-columns: 280px 1fr;
        min-height: 100vh;
      }

      [data-sidebar="closed"] .layout {
        grid-template-columns: 1fr;
      }

      [data-sidebar="closed"] .sidebar {
        display: none;
      }

      .sidebar {
        background: var(--sidebar);
        border-right: 1px solid var(--line);
        padding: 28px 20px;
        display: flex;
        flex-direction: column;
        gap: 24px;
      }

      .brand {
        display: flex;
        align-items: center;
        gap: 12px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .brand-badge {
        width: 36px;
        height: 36px;
        border-radius: 12px;
        background: linear-gradient(135deg, #3f7e63, #9bd0b5);
        display: grid;
        place-items: center;
        color: white;
        font-weight: 700;
      }

      .sidebar section {
        display: grid;
        gap: 12px;
      }

      .sidebar h3 {
        margin: 0;
        font-size: 13px;
        text-transform: uppercase;
        letter-spacing: 0.16em;
        color: var(--muted);
      }

      .menu-item {
        padding: 12px 14px;
        border-radius: 12px;
        background: transparent;
        border: 1px solid transparent;
        color: var(--ink);
        display: flex;
        align-items: center;
        gap: 10px;
        cursor: pointer;
        transition: all 0.2s ease;
      }

      .menu-item.active {
        background: #fff7e8;
        border-color: #e7d8bf;
        box-shadow: 0 6px 20px rgba(29, 27, 23, 0.08);
      }

      .menu-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: var(--accent);
      }

      .main {
        display: grid;
        grid-template-rows: auto 1fr auto;
        gap: 18px;
        padding: 24px 32px 28px;
      }

      .topbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .controls-row {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .model-select {
        display: flex;
        align-items: center;
        gap: 10px;
        background: var(--card);
        border: 1px solid var(--line);
        padding: 10px 14px;
        border-radius: 999px;
        box-shadow: var(--shadow);
      }

      .model-select select {
        border: none;
        background: transparent;
        font-family: "Space Grotesk", system-ui, sans-serif;
        font-weight: 600;
        outline: none;
        color: var(--ink);
      }

      .config-input {
        display: flex;
        align-items: center;
        gap: 8px;
        background: var(--card);
        border: 1px solid var(--line);
        padding: 8px 12px;
        border-radius: 999px;
        box-shadow: var(--shadow);
      }

      .config-input input {
        border: none;
        outline: none;
        background: transparent;
        color: var(--ink);
        font-family: "DM Mono", ui-monospace, monospace;
        font-size: 12px;
        min-width: 160px;
      }

      .config-input input::placeholder {
        color: var(--muted);
      }

      .config-input .label {
        font-size: 12px;
        color: var(--muted);
        white-space: nowrap;
      }

      .status {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 14px;
      }

      .status-dot {
        width: 8px;
        height: 8px;
        border-radius: 50%;
        background: #2fbf71;
        box-shadow: 0 0 12px rgba(47, 191, 113, 0.6);
      }

      .panel-toggle {
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--ink);
        padding: 8px 12px;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: var(--shadow);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .panel-toggle:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(47, 107, 86, 0.2);
      }

      .theme-toggle {
        border: 1px solid var(--line);
        background: var(--card);
        color: var(--ink);
        padding: 8px 10px;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
        box-shadow: var(--shadow);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
      }

      .theme-toggle:hover {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(47, 107, 86, 0.2);
      }

      .theme-toggle svg {
        width: 18px;
        height: 18px;
        display: block;
      }

      .theme-toggle .icon-sun {
        display: block;
      }

      .theme-toggle .icon-moon {
        display: none;
      }

      [data-theme="dark"] .theme-toggle .icon-sun {
        display: none;
      }

      [data-theme="dark"] .theme-toggle .icon-moon {
        display: block;
      }

      .chat-panel {
        background: transparent;
        border-radius: 28px;
        border: 1px solid transparent;
        padding: 28px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        overflow: hidden;
      }

      .chat-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
      }

      .chat-header h2 {
        margin: 0;
        font-size: 22px;
      }

      .assistant-card {
        display: flex;
        align-items: center;
        gap: 12px;
        background: var(--assistant-card);
        border-radius: 16px;
        padding: 12px 16px;
        border: 1px solid var(--assistant-border);
      }

      .assistant-card span {
        font-weight: 600;
      }

      .messages {
        flex: 1;
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        gap: 16px;
        padding-right: 6px;
      }

      .message {
        display: grid;
        gap: 8px;
        animation: fadeIn 0.4s ease;
      }

      .message.user {
        justify-items: end;
      }

      .message.user .meta {
        text-align: right;
      }

      .message .meta {
        font-size: 12px;
        color: var(--muted);
      }

      .bubble {
        padding: 14px 16px;
        border-radius: 16px;
        max-width: 78%;
        line-height: 1.5;
        white-space: pre-wrap;
      }

      .bubble.user {
        align-self: flex-end;
        background: #2f6b56;
        color: #fff;
        border-bottom-right-radius: 4px;
      }

      .bubble.assistant {
        align-self: flex-start;
        background: var(--bubble-assistant);
        border: 1px solid var(--bubble-assistant-border);
        border-bottom-left-radius: 4px;
      }


      .composer {
        display: grid;
        gap: 12px;
        background: var(--card);
        border: 1px solid var(--line);
        padding: 16px;
        border-radius: 20px;
        box-shadow: var(--shadow);
      }

      .composer textarea {
        width: 100%;
        border: none;
        resize: none;
        min-height: 72px;
        font-family: inherit;
        font-size: 15px;
        background: transparent;
        outline: none;
        color: var(--ink);
      }

      .composer textarea::placeholder {
        color: var(--muted);
      }

      .composer-actions {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      .actions-left {
        display: flex;
        align-items: center;
        gap: 8px;
        color: var(--muted);
        font-size: 12px;
      }

      .send {
        background: var(--accent);
        border: none;
        color: white;
        padding: 10px 18px;
        border-radius: 999px;
        font-weight: 600;
        cursor: pointer;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }

      .send:disabled {
        background: #9fb5ab;
        cursor: not-allowed;
      }

      .send:hover:not(:disabled) {
        transform: translateY(-1px);
        box-shadow: 0 10px 22px rgba(47, 107, 86, 0.3);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      @media (max-width: 980px) {
        .layout {
          grid-template-columns: 1fr;
        }

        .sidebar {
          flex-direction: row;
          flex-wrap: wrap;
          justify-content: space-between;
        }

        .main {
          padding: 20px;
        }

        .chat-panel {
          padding: 22px;
        }
      }

      @media (max-width: 640px) {
        .sidebar {
          display: none;
        }

        .chat-panel {
          border-radius: 20px;
        }

        .bubble {
          max-width: 100%;
        }
      }
    </style>
  </head>
  <body>
    <div class="layout">
      <aside class="sidebar">
        <div class="brand">
          <div class="brand-badge">OW</div>
          <div>
            <div>Open WebUI</div>
            <small style="color: var(--muted)">NotebookLM Bridge</small>
          </div>
        </div>

        <section>
          <h3>Workspace</h3>
          <button class="menu-item active" type="button">
            <span class="menu-dot"></span>
            <span>New chat</span>
          </button>
          <button class="menu-item" type="button">
            <span>Notes</span>
          </button>
          <button class="menu-item" type="button">
            <span>Team</span>
          </button>
        </section>

        <section>
          <h3>Recent</h3>
          <button class="menu-item" type="button">
            <span>AI Assistant Intro</span>
          </button>
          <button class="menu-item" type="button">
            <span>Notebook Summaries</span>
          </button>
        </section>
      </aside>

      <main class="main">
        <div class="topbar">
          <div class="controls-row">
            <button id="sidebarToggle" class="panel-toggle" type="button" aria-label="Show sidebar" title="Show sidebar">
              Panel
            </button>
            <div class="model-select">
              <span style="font-size: 12px; color: var(--muted)">Provider</span>
              <select id="providerSelect">
                <option value="local" selected>Local</option>
                <option value="ollama">Ollama</option>
                <option value="openai">OpenAI</option>
                <option value="google">Google</option>
                <option value="deepseek">DeepSeek</option>
              </select>
            </div>
            <div class="config-input">
              <span class="label">Base URL</span>
              <input id="baseUrlInput" type="text" placeholder="https://..." autocomplete="off" />
            </div>
            <div class="config-input">
              <span class="label">API Key</span>
              <input id="apiKeyInput" type="password" placeholder="optional" autocomplete="off" />
            </div>
            <div class="model-select">
              <span style="font-size: 12px; color: var(--muted)">Model</span>
              <select id="modelSelect">
                <option value="qwen2:7b" selected>qwen2:7b</option>
                <option value="qwen2.5:14b">qwen2.5:14b</option>
                <option value="llama3:8b">llama3:8b</option>
              </select>
            </div>
          </div>
          <div style="display: flex; align-items: center; gap: 10px">
            <button id="themeToggle" class="theme-toggle" type="button" aria-label="Light theme" title="Light theme">
              <svg class="icon-sun" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <circle cx="12" cy="12" r="4"></circle>
                <line x1="12" y1="2" x2="12" y2="5"></line>
                <line x1="12" y1="19" x2="12" y2="22"></line>
                <line x1="2" y1="12" x2="5" y2="12"></line>
                <line x1="19" y1="12" x2="22" y2="12"></line>
                <line x1="4.2" y1="4.2" x2="6.3" y2="6.3"></line>
                <line x1="17.7" y1="17.7" x2="19.8" y2="19.8"></line>
                <line x1="4.2" y1="19.8" x2="6.3" y2="17.7"></line>
                <line x1="17.7" y1="6.3" x2="19.8" y2="4.2"></line>
              </svg>
              <svg class="icon-moon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
                <path d="M21 12.79A9 9 0 1 1 11.21 3a7 7 0 0 0 9.79 9.79z"></path>
              </svg>
            </button>
            <div class="status">
              <span class="status-dot"></span>
              <span id="statusText">Connected</span>
            </div>
          </div>
        </div>

        <section class="chat-panel">
          <div class="chat-header">
            <h2>Ask anything</h2>
            <div class="assistant-card">
              <div class="brand-badge" style="width: 28px; height: 28px; font-size: 12px">AI</div>
              <span>NotebookLM Assistant</span>
            </div>
          </div>

          <div id="messages" class="messages"></div>

        </section>

        <section class="composer">
          <textarea id="input" placeholder="Type your message..."></textarea>
          <div class="composer-actions">
            <div class="actions-left">
              <span id="tokenHint">Tip: Shift + Enter for new line</span>
            </div>
            <button id="sendBtn" class="send" type="button">Send</button>
          </div>
        </section>
      </main>
    </div>

    <script>
      const messagesEl = document.getElementById("messages");
      const inputEl = document.getElementById("input");
      const sendBtn = document.getElementById("sendBtn");
      const providerSelect = document.getElementById("providerSelect");
      const baseUrlInput = document.getElementById("baseUrlInput");
      const apiKeyInput = document.getElementById("apiKeyInput");
      const modelSelect = document.getElementById("modelSelect");
      const statusText = document.getElementById("statusText");
      const themeToggle = document.getElementById("themeToggle");
      const sidebarToggle = document.getElementById("sidebarToggle");

      const providers = {
        local: { baseUrl: "", auth: "none" },
        ollama: { baseUrl: "http://localhost:11434", auth: "none" },
        openai: { baseUrl: "https://api.openai.com", auth: "bearer" },
        google: { baseUrl: "https://generativelanguage.googleapis.com/v1beta/openai", auth: "x-goog-api-key" },
        deepseek: { baseUrl: "https://api.deepseek.com", auth: "bearer" },
      };

      const history = [];

      function setTheme(mode, persist = true) {
        document.documentElement.setAttribute("data-theme", mode);
        const label = mode === "dark" ? "Dark theme" : "Light theme";
        themeToggle.setAttribute("aria-label", label);
        themeToggle.setAttribute("title", label);
        if (persist) {
          localStorage.setItem("theme", mode);
        }
      }

      function setSidebar(state, persist = true) {
        document.documentElement.setAttribute("data-sidebar", state);
        const label = state === "closed" ? "Show sidebar" : "Hide sidebar";
        sidebarToggle.setAttribute("aria-label", label);
        sidebarToggle.setAttribute("title", label);
        if (persist) {
          localStorage.setItem("sidebar", state);
        }
      }

      const storedSidebar = localStorage.getItem("sidebar") || "closed";
      setSidebar(storedSidebar, false);

      function loadProviderConfig(provider) {
        const defaults = providers[provider] || providers.local;
        const storedBase = localStorage.getItem(`provider.${provider}.baseUrl`);
        const storedKey = localStorage.getItem(`provider.${provider}.apiKey`);
        baseUrlInput.value = storedBase ?? defaults.baseUrl;
        apiKeyInput.value = storedKey ?? "";
      }

      function saveProviderConfig(provider) {
        localStorage.setItem(`provider.${provider}.baseUrl`, baseUrlInput.value.trim());
        localStorage.setItem(`provider.${provider}.apiKey`, apiKeyInput.value.trim());
      }

      const storedProvider = localStorage.getItem("provider") || "local";
      providerSelect.value = providers[storedProvider] ? storedProvider : "local";
      loadProviderConfig(providerSelect.value);

      const systemTheme = window.matchMedia("(prefers-color-scheme: dark)");
      const storedMode = localStorage.getItem("themeMode") || "system";

      function applySystemTheme(matches) {
        setTheme(matches ? "dark" : "light", false);
      }

      if (storedMode === "manual") {
        const storedTheme = localStorage.getItem("theme");
        if (storedTheme === "dark" || storedTheme === "light") {
          setTheme(storedTheme, false);
        } else {
          applySystemTheme(systemTheme.matches);
        }
      } else {
        applySystemTheme(systemTheme.matches);
      }

      systemTheme.addEventListener("change", (event) => {
        if ((localStorage.getItem("themeMode") || "system") !== "manual") {
          applySystemTheme(event.matches);
        }
      });

      function addMessage(role, content) {
        const wrapper = document.createElement("div");
        wrapper.className = `message ${role}`;

        const meta = document.createElement("div");
        meta.className = "meta";
        meta.textContent = role === "user" ? "You" : "Assistant";

        const bubble = document.createElement("div");
        bubble.className = `bubble ${role}`;
        bubble.textContent = content;

        wrapper.appendChild(meta);
        wrapper.appendChild(bubble);
        messagesEl.appendChild(wrapper);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;

        addMessage("user", text);
        history.push({ role: "user", content: text });
        inputEl.value = "";
        sendBtn.disabled = true;
        statusText.textContent = "Thinking...";

        try {
          const provider = providerSelect.value;
          const providerConfig = providers[provider] || providers.local;
          const baseUrl = baseUrlInput.value.trim();
          const endpoint = "/v1/chat/completions";
          const url = baseUrl ? `${baseUrl.replace(/\/$/, "")}${endpoint}` : endpoint;

          const headers = { "Content-Type": "application/json" };
          const apiKey = apiKeyInput.value.trim();
          if (apiKey) {
            if (providerConfig.auth === "bearer") {
              headers.Authorization = `Bearer ${apiKey}`;
            } else if (providerConfig.auth === "x-goog-api-key") {
              headers["x-goog-api-key"] = apiKey;
            }
          }

          const response = await fetch(url, {
            method: "POST",
            headers,
            body: JSON.stringify({
              model: modelSelect.value,
              messages: history,
              temperature: 0.7,
            }),
          });

          if (!response.ok) {
            const detail = await response.json().catch(() => ({}));
            throw new Error(detail.detail || "Request failed");
          }

          const data = await response.json();
          const answer = data?.choices?.[0]?.message?.content || "No response";
          history.push({ role: "assistant", content: answer });
          addMessage("assistant", answer);
          statusText.textContent = "Connected";
        } catch (error) {
          addMessage("assistant", `Error: ${error.message}`);
          statusText.textContent = "Error";
        } finally {
          sendBtn.disabled = false;
        }
      }

      sendBtn.addEventListener("click", sendMessage);
      providerSelect.addEventListener("change", () => {
        const provider = providerSelect.value;
        localStorage.setItem("provider", provider);
        loadProviderConfig(provider);
      });
      baseUrlInput.addEventListener("change", () => {
        saveProviderConfig(providerSelect.value);
      });
      apiKeyInput.addEventListener("change", () => {
        saveProviderConfig(providerSelect.value);
      });
      sidebarToggle.addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-sidebar") || "closed";
        setSidebar(current === "closed" ? "open" : "closed");
      });
      themeToggle.addEventListener("click", () => {
        const current = document.documentElement.getAttribute("data-theme") || "light";
        setTheme(current === "dark" ? "light" : "dark");
        localStorage.setItem("themeMode", "manual");
      });
      inputEl.addEventListener("keydown", (event) => {
        if (event.key === "Enter" && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });

    </script>
  </body>
</html>
